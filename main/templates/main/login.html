<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fff4e6;
            color: #4a3f35;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        #car-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
        .floating-car {
            position: absolute;
            font-size: 24px;
            user-select: none;
            animation: fall linear infinite;
            opacity: 0.4;
        }
        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(105vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        .login-container {
            background: white;
            padding: 50px 45px;
            border-radius: 20px;
            border-top: 6px solid #f57c00;
            border-bottom: 6px solid #2e7d32;
            box-shadow: 0 10px 40px rgba(245, 124, 0, 0.15);
            max-width: 440px;
            width: 100%;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container::before {
            content: '🚗';
            position: absolute;
            top: -30px;
            right: -20px;
            font-size: 80px;
            opacity: 0.06;
            transform: rotate(15deg);
        }
        .login-container::after {
            content: '🚗';
            position: absolute;
            bottom: -30px;
            left: -20px;
            font-size: 70px;
            opacity: 0.06;
            transform: rotate(-10deg);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-header .emoji {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }
        .login-header h2 {
            color: #e65100;
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }
        .login-header p {
            color: #888;
            font-size: 0.95rem;
            margin-top: 5px;
        }
        .login-header .brand {
            color: #2e7d32;
            font-weight: 700;
        }

        .error-message {
            background: #ffebee;
            border: 2px solid #ef9a9a;
            color: #c62828;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error-message .error-icon {
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #4a3f35;
        }
        .form-group label .required {
            color: #d32f2f;
            margin-left: 3px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ede3d0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fdfbf7;
            color: #4a3f35;
        }
        .form-group input:focus {
            border-color: #f57c00;
            outline: none;
            box-shadow: 0 0 0 4px rgba(245, 124, 0, 0.1);
            background: white;
        }
        .form-group input::placeholder {
            color: #bbb;
        }

        .input-icon {
            position: relative;
        }
        .input-icon input {
            padding-left: 50px;
        }
        .input-icon .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            opacity: 0.6;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
        }
        .form-options input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #f57c00;
            cursor: pointer;
        }
        .form-options a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .form-options a:hover {
            color: #1b5e20;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f57c00, #e65100);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(245, 124, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(245, 124, 0, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #f5f0eb;
            padding-top: 25px;
        }
        .login-footer p {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #666;
        }
        .login-footer a {
            color: #f57c00;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .login-footer a:hover {
            color: #e65100;
            text-decoration: underline;
        }
        .login-footer .home-link {
            color: #2e7d32;
        }
        .login-footer .home-link:hover {
            color: #1b5e20;
        }

    
        @media (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
                border-radius: 16px;
            }
            .login-header h2 {
                font-size: 1.6rem;
            }
            .login-header .emoji {
                font-size: 40px;
            }
            .form-group input {
                padding: 12px 15px;
                font-size: 0.95rem;
            }
            .input-icon input {
                padding-left: 45px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn-login {
                font-size: 1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    
    <div id="car-container"></div>
    <div class="login-container">
        <div class="login-header">
            <span class="emoji">🚗</span>
            <h2>Добро пожаловать!</h2>
            <p>Войдите в <span class="brand">ArtShop</span>, чтобы продолжить</p>
        </div>

   
        {% if form.errors %}
            <div class="error-message">
                <span class="error-icon">❌</span>
                Неверное имя пользователя или пароль. Попробуйте снова.
            </div>
        {% endif %}

   
        <form method="post" action="{% url 'catalog:login' %}">
            {% csrf_token %}

            <div class="form-group input-icon">
                <label for="id_username">Имя пользователя <span class="required">*</span></label>
                <span class="icon">👤</span>
                <input type="text" name="username" id="id_username" placeholder="Введите ваше имя" required autofocus>
            </div>

            <div class="form-group input-icon">
                <label for="id_password">Пароль <span class="required">*</span></label>
                <span class="icon">🔒</span>
                <input type="password" name="password" id="id_password" placeholder="Введите ваш пароль" required>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember" value="1">
                    Запомнить меня
                </label>
                <a href="#">Забыли пароль?</a>
            </div>

            <button type="submit" class="btn-login">
                🔑 Войти
                <span style="font-size: 1.2rem;">🚗</span>
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <div class="login-footer">
            <p>Нет аккаунта? <a href="{% url 'catalog:register' %}">Зарегистрироваться →</a></p>
            <p><a href="{% url 'catalog:index' %}" class="home-link">🏠 На главную</a></p>
        </div>
    </div>

    <script>
      
        const carContainer = document.getElementById('car-container');
        const carEmojis = ['🚗', '🚕', '🚙', '🚘', '🚖', '🏎️'];

        function createCar() {
            const car = document.createElement('div');
            car.classList.add('floating-car');
            car.innerText = carEmojis[Math.floor(Math.random() * carEmojis.length)];
            car.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 4 + 5;
            car.style.animationDuration = duration + 's';
            car.style.fontSize = Math.random() * 16 + 20 + 'px';
            carContainer.appendChild(car);
            setTimeout(() => {
                car.remove();
            }, duration * 1000);
        }
        setInterval(createCar, 700);

        document.addEventListener('DOMContentLoaded', function() {
            const usernameField = document.getElementById('id_username');
            if (usernameField) {
                usernameField.focus();
            }
        });
    </script>
</body>
</html>
