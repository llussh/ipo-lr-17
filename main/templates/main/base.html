<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ оформлен!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff4e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            border-top: 6px solid #f57c00;
        }
        .emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
        }
        h1 {
            color: #e65100;
            font-size: 32px;
            margin: 10px 0;
        }
        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
        }
        .order-number {
            color: #f57c00;
            font-weight: bold;
            font-size: 20px;
        }
        .btn {
            display: inline-block;
            background: #f57c00;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #e65100;
        }
        .btn:active {
            background: #bf360c;
        }
        .highlight {
            color: #2e7d32;
            font-weight: bold;
        }
        .card-footer {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .card-footer span {
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="emoji">🚗</span>
        <h1>Заказ оформлен!</h1>
        <p>Спасибо за покупку!<br>Мы свяжемся с вами в ближайшее время.</p>
        <p><span class="order-number">Номер заказа: #{{ order.id }}</span></p>
        <a href="/catalog/" class="btn">Продолжить покупки</a>
        <div class="card-footer">
            🚀 Доставка <span>быстрая</span> и <span>надёжная</span>
        </div>
    </div>
</body>
</html>
