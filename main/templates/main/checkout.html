<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfbf7; color: #4a3f35; margin: 0; padding: 0; position: relative; overflow-x: hidden; }
        #cat-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .floating-cat { position: absolute; font-size: 24px; user-select: none; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 100% { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
        nav { background-color: #f4efe6; padding: 15px 0; border-bottom: 1px solid #e9dfce; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 25px; justify-content: center; }
        nav a { color: #6b5b4b; text-decoration: none; font-weight: 500; }
        .container { max-width: 600px; margin: 50px auto; padding: 30px; background: white; border-radius: 12px; border: 1px solid #efeae0; box-shadow: 0 4px 6px rgba(140, 109, 83, 0.01); position: relative; z-index: 10; }
        h1 { margin-top: 0; color: #3d3126; font-size: 1.8rem; border-bottom: 2px solid #f4efe6; padding-bottom: 10px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.95rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ede3d0; border-radius: 8px; font-family: inherit; box-sizing: border-box; color: #4a3f35; font-size: 0.95rem; }
        .btn-order { background-color: #8c6d53; color: white; border: none; padding: 14px 28px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; font-family: inherit; width: 100%; margin-top: 10px; transition: background 0.3s ease; }
        .btn-order:hover { background-color: #735943; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #8c6d53; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="cat-container"></div>

    <nav>
        <ul>
            <li><a href="{% url 'catalog:index' %}">Главная</a></li>
            <li><a href="{% url 'catalog:product_list' %}">Каталог</a></li>
            <li><a href="{% url 'catalog:cart_view' %}">Корзина</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Оформление заказа</h1>
        <form method="post" action="">
            {% csrf_token %}
            
            <div class="form-group">
                <label>ФИО получателя</label>
                <input type="text" name="full_name" value="{{ user.profile.full_name|default:'' }}" required placeholder="Иванов Иван Иванович">
            </div>

            <div class="form-group">
                <label>Контактный телефон</label>
                <input type="text" name="phone" value="{{ user.profile.phone|default:'' }}" required placeholder="+375 (XX) XXX-XX-XX">
            </div>

            <div class="form-group">
                <label>Адрес доставки (г. Минск)</label>
                <textarea name="address" rows="3" required placeholder="Улица, дом, квартира (Микрорайон: {{ user.profile.district|default:'не указан' }})">{{ user.profile.address|default:'' }}</textarea>
            </div>

            <button type="submit" class="btn-order">Подтвердить заказ</button>
        </form>
        
        <a href="{% url 'catalog:cart_view' %}" class="back-link">← Вернуться в корзину</a>
    </div>

    <script>
        const catContainer = document.getElementById('cat-container');
        const catEmojis = ['🐱', '🐈', '🐾', '😸', '😻', '🐈‍⬛'];
        function createCat() {
            const cat = document.createElement('div');
            cat.classList.add('floating-cat');
            cat.innerText = catEmojis[Math.floor(Math.random() * catEmojis.length)];
            cat.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 4 + 5;
            cat.style.animationDuration = duration + 's';
            cat.style.fontSize = Math.random() * 12 + 20 + 'px';
            catContainer.appendChild(cat);
            setTimeout(() => { cat.remove(); }, duration * 1000);
        }
        setInterval(createCat, 700);
    </script>
</body>
</html>
